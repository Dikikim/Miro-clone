<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'grid-pattern': "radial-gradient(#cbd5e1 1px, transparent 1px)",
                        'grid-pattern-dark': "radial-gradient(#334155 1px, transparent 1px)",
                    },
                    backgroundSize: {
                        'grid': '20px 20px',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for toolbar if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Floating animation for selection */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 overflow-hidden h-screen w-screen relative group/design-root">

<!-- Top Header -->

</div>

<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg bg-primary/10 text-primary hover:bg-primary hover:text-white transition-all">

<!-- Tooltip -->

</button>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">
<span class="material-symbols-outlined text-[24px]">grid_view</span>

</button>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">

<span class="absolute left-full ml-3 px-2 py-1 bg-slate-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Text (T)</span>
</button>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">
<span class="material-symbols-outlined text-[24px] filled">sticky_note_2</span>
<span class="absolute left-full ml-3 px-2 py-1 bg-slate-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Sticky Note (N)</span>
</button>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">
<span class="material-symbols-outlined text-[24px]">shapes</span>
<span class="absolute left-full ml-3 px-2 py-1 bg-slate-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Shapes (S)</span>
</button>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">
<span class="material-symbols-outlined text-[24px]">airline_stops</span>

<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">

</button>
<div class="h-px bg-slate-200 dark:bg-slate-700 my-1"></div>
<button class="group relative flex items-center justify-center w-10 h-10 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
<span class="absolute left-full ml-3 px-2 py-1 bg-slate-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">More Tools</span>
</button>
</div>
<!-- Bottom Left Controls (Zoom & Map) -->
<div class="absolute bottom-6 left-6 z-40 flex flex-col gap-4">
<!-- Mini Map (Open state) -->
<div class="bg-white dark:bg-slate-800 p-2 rounded-lg shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-200 dark:border-slate-700 w-48 h-32 relative overflow-hidden group cursor-grab">
<div class="absolute inset-0 bg-slate-50 dark:bg-slate-900">
<!-- Map content placeholder -->
<div class="absolute top-1/4 left-1/4 w-8 h-8 bg-amber-200 opacity-50 rounded-sm"></div>
<div class="absolute top-1/3 left-1/2 w-12 h-6 bg-blue-200 opacity-50 rounded-sm"></div>
<!-- Viewport indicator -->
<div class="absolute top-[20%] left-[20%] w-[40%] h-[50%] border-2 border-primary bg-primary/10 cursor-move"></div>
</div>
<button class="absolute top-1 right-1 p-1 bg-white/80 dark:bg-slate-800/80 rounded hover:bg-white dark:hover:bg-slate-700">
<span class="material-symbols-outlined text-[16px] text-slate-500">close</span>
</button>
</div>
<!-- Zoom Controls -->
<div class="flex items-center bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-1 self-start">

<button class="px-3 h-8 flex items-center justify-center text-sm font-bold text-slate-700 dark:text-slate-200 min-w-[3.5rem] hover:bg-slate-50 dark:hover:bg-slate-700/50 rounded cursor-pointer">
                100%
            </button>
<button class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
<div class="w-px h-5 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300" title="Fit to screen">
<span class="material-symbols-outlined text-[20px]">fit_screen</span>
</button>
</div>
</div>

<div class="flex items-center bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-1">
<button class="w-9 h-9 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-[20px]">undo</span>
</button>
<button class="w-9 h-9 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-[20px]">redo</span>
</button>
</div>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-slate-900 dark:bg-slate-700 text-white shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-[24px]">question_mark</span>
</button>
</div>

<div class="absolute top-0 left-0 w-full h-full z-10 overflow-hidden pointer-events-none">

<li>Iteration sprint</li>
</ul>

</div>

                        Process
                    </div>
</div>
<!-- Circle Node -->
<div class="relative w-24 h-24 bg-green-100 dark:bg-green-900/30 rounded-full border-2 border-green-500 flex items-center justify-center shadow-md group cursor-pointer">

<div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-3 h-3 bg-white border-2 border-green-500 rounded-full opacity-0 group-hover:opacity-100"></div>
</div>
</div>

                    </div>
<!-- Selection Box -->
<div class="absolute -inset-4 border border-dashed border-primary/50 rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none bg-primary/5"></div>
</div>
</div>
<!-- Other user's cursor -->
<div class="absolute top-1/4 right-1/4 transform translate-y-12">
<span class="material-symbols-outlined text-purple-600 dark:text-purple-400 absolute top-0 left-0 -ml-1 -mt-1 text-[24px]" style="transform: rotate(-15deg);">near_me</span>
<div class="ml-4 mt-4 px-2 py-0.5 bg-purple-600 text-white text-[10px] font-bold rounded-md shadow-sm whitespace-nowrap">
